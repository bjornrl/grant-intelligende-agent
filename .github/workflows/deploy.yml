name: Deploy to Netlify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Node ─────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── Install ───────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Lint ─────────────────────────────────────────────────────────────
      - name: Lint
        run: npm run lint
        continue-on-error: true   # warn but don't block deploy

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # ── Install Netlify CLI ───────────────────────────────────────────────
      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      # ── Deploy to Netlify ─────────────────────────────────────────────────
      # Uses netlify-cli so that TypeScript functions are compiled with
      # esbuild (per netlify.toml) and deployed alongside the static build.
      # Production deploy on main; preview deploy on pull requests.
      - name: Deploy to Netlify
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            netlify deploy \
              --dir dist \
              --functions netlify/functions \
              --prod \
              --message "Deploy from GitHub Actions — ${{ github.sha }}"
          else
            netlify deploy \
              --dir dist \
              --functions netlify/functions \
              --message "Preview — ${{ github.sha }}"
          fi
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
